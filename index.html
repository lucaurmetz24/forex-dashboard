<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Fundamental Dashboard</title>
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --bg4: #252730;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6df;
    --text2: #9a9890;
    --text3: #5e5d58;
    --green: #4caf7d;
    --green-bg: rgba(76,175,125,0.1);
    --red: #e05c5c;
    --red-bg: rgba(224,92,92,0.1);
    --amber: #e8a838;
    --amber-bg: rgba(232,168,56,0.1);
    --blue: #4a8fe8;
    --blue-bg: rgba(74,143,232,0.1);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* Layout */
  .app { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .header-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .header-left p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .refresh-btn {
    background: var(--bg3); border: 0.5px solid var(--border2);
    color: var(--text2); padding: 8px 16px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: var(--bg4); color: var(--text); }
  .refresh-btn.loading .icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .grid-2 { display: grid; grid-template-columns: 1fr 340px; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  .grid-spreads { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-spreads { grid-template-columns: repeat(3, 1fr); }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .grid-spreads { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 14px;
  }

  /* Sentiment score */
  .sentiment-top { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }
  .score-circle {
    width: 76px; height: 76px; flex-shrink: 0;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .score-circle svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .score-inner { text-align: center; position: relative; z-index: 1; }
  .score-num { font-size: 22px; font-weight: 700; line-height: 1; }
  .score-denom { font-size: 10px; color: var(--text3); }
  .sentiment-info { flex: 1; }
  .sentiment-badge {
    display: inline-block; font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 6px;
  }
  .sentiment-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .drivers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .driver {
    background: var(--bg3); border-radius: var(--radius-sm);
    padding: 10px; border: 0.5px solid var(--border);
  }
  .driver-name { font-size: 12px; font-weight: 600; }
  .driver-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .driver-price { font-size: 15px; font-weight: 600; margin-top: 6px; }
  .driver-chg { font-size: 11px; margin-top: 2px; }
  .driver-contrib { font-size: 10px; margin-top: 3px; color: var(--text3); }

  /* Sentiment panel right */
  .market-drivers { display: flex; flex-direction: column; gap: 0; }
  .md-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 0.5px solid var(--border);
  }
  .md-row:last-child { border-bottom: none; }
  .md-left .md-name { font-size: 13px; font-weight: 600; }
  .md-left .md-sub { font-size: 11px; color: var(--text3); }
  .md-right { text-align: right; }
  .md-val { font-size: 14px; font-weight: 600; }
  .md-chg { font-size: 12px; }

  /* Spread cards */
  .spread-card {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .spread-pair { font-size: 13px; font-weight: 700; letter-spacing: 0.03em; }
  .spread-val { font-size: 20px; font-weight: 700; margin: 6px 0 2px; }
  .spread-desc { font-size: 10px; color: var(--text3); }
  .spread-bias { font-size: 11px; font-weight: 600; margin-top: 6px; }

  /* CB Bias */
  .cb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  @media (max-width: 900px) { .cb-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .cb-grid { grid-template-columns: repeat(2, 1fr); } }
  .cb-card {
    background: var(--bg3); border-radius: var(--radius-sm);
    padding: 12px; border: 0.5px solid var(--border);
    text-align: center;
  }
  .cb-bank { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--text2); }
  .cb-currency { font-size: 13px; font-weight: 700; margin: 2px 0; }
  .cb-rate { font-size: 18px; font-weight: 700; margin: 6px 0 4px; }
  .cb-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; letter-spacing: 0.04em;
  }
  .cb-last { font-size: 10px; color: var(--text3); margin-top: 6px; }

  /* Colors */
  .c-green { color: var(--green); }
  .c-red { color: var(--red); }
  .c-amber { color: var(--amber); }
  .c-blue { color: var(--blue); }
  .c-muted { color: var(--text2); }
  .bg-green { background: var(--green-bg); color: var(--green); }
  .bg-red { background: var(--red-bg); color: var(--red); }
  .bg-amber { background: var(--amber-bg); color: var(--amber); }
  .bg-blue { background: var(--blue-bg); color: var(--blue); }
  .bg-muted { background: var(--bg4); color: var(--text2); }

  /* Chart */
  .chart-wrap { position: relative; width: 100%; height: 120px; margin-top: 16px; }

  /* Pulse dot */
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    display: inline-block; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Skeleton */
  .skel {
    background: var(--bg3); border-radius: 4px; height: 14px;
    animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:0.8} }

  .updated { font-size: 11px; color: var(--text3); text-align: right; margin-top: 12px; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .section-label { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .section-sub { font-size: 12px; color: var(--text3); }

  /* Pair Bias Matrix */
  .matrix-wrap { overflow-x: auto; }
  table.matrix {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  table.matrix th, table.matrix td {
    padding: 8px 10px; text-align: center; border: 0.5px solid var(--border);
  }
  table.matrix th { font-weight: 600; color: var(--text3); font-size: 11px; }
  table.matrix td.pair-label { font-weight: 700; text-align: left; color: var(--text2); }
  .matrix-cell { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; display: inline-block; }

  .error { font-size: 13px; color: var(--text3); padding: 20px; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Forex Fundamental Dashboard</h1>
      <p>G10 · Risk Sentiment · Yield Spreads · Central Bank Bias</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <span class="icon" style="display:inline-block">↻</span> Refresh
    </button>
  </div>

  <!-- Section: Risk Sentiment -->
  <div class="section-header">
    <span class="section-label">Risk Sentiment</span>
    <span style="display:flex;align-items:center;gap:6px"><span class="live-dot"></span><span class="section-sub" id="updated-label">—</span></span>
  </div>
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card" id="sentiment-main-card">
      <div class="card-title">Composite Score</div>
      <div id="sentiment-main-content"><div class="skel" style="height:76px;margin-bottom:12px"></div><div class="skel" style="width:60%;margin-bottom:8px"></div><div class="skel" style="width:40%"></div></div>
    </div>
    <div class="card" id="market-drivers-card">
      <div class="card-title">Market Drivers</div>
      <div id="market-drivers-content"><div class="skel" style="margin-bottom:8px"></div><div class="skel" style="margin-bottom:8px"></div><div class="skel" style="margin-bottom:8px"></div><div class="skel" style="margin-bottom:8px"></div><div class="skel"></div></div>
    </div>
  </div>

  <!-- Section: Yield Spreads -->
  <div class="section-header">
    <span class="section-label">Yield Spreads <span style="font-size:13px;font-weight:400;color:var(--text3)">10Y vs USD</span></span>
  </div>
  <div class="grid-spreads" id="spreads-grid">
    <div class="spread-card"><div class="skel" style="height:80px"></div></div>
    <div class="spread-card"><div class="skel" style="height:80px"></div></div>
    <div class="spread-card"><div class="skel" style="height:80px"></div></div>
    <div class="spread-card"><div class="skel" style="height:80px"></div></div>
    <div class="spread-card"><div class="skel" style="height:80px"></div></div>
  </div>

  <!-- Section: Central Bank Bias -->
  <div class="section-header">
    <span class="section-label">Central Bank Bias</span>
    <span class="section-sub">Leitzins + Tendenz</span>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="cb-grid" id="cb-grid">
      <div class="skel" style="height:100px"></div>
      <div class="skel" style="height:100px"></div>
      <div class="skel" style="height:100px"></div>
      <div class="skel" style="height:100px"></div>
      <div class="skel" style="height:100px"></div>
    </div>
  </div>

  <!-- Section: Pair Bias Matrix -->
  <div class="section-header">
    <span class="section-label">Pair Bias Matrix</span>
    <span class="section-sub">Yield Spread + Sentiment kombiniert</span>
  </div>
  <div class="card" style="margin-bottom:24px">
    <div class="matrix-wrap" id="matrix-wrap">
      <div class="skel" style="height:160px"></div>
    </div>
  </div>

  <div class="updated" id="footer-updated"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const PROXY = "https://query1.finance.yahoo.com/v8/finance/chart/";

const SENTIMENT_TICKERS = {
  "^GSPC": { label: "S&P 500", sub: "Equity momentum", riskDir: 1 },
  "^NDX":  { label: "Nasdaq", sub: "Tech equities", riskDir: 1 },
  "^VIX":  { label: "VIX", sub: "Implied volatility", riskDir: -1 },
  "GC=F":  { label: "Gold", sub: "Safe haven demand", riskDir: -1 },
  "CL=F":  { label: "WTI Oil", sub: "Risk proxy", riskDir: 1 },
  "HG=F":  { label: "Copper", sub: "Industrial demand", riskDir: 1 },
};

const SPREAD_PAIRS = [
  { label: "AUD/USD", localTicker: "^AX10Y", invert: false, bullish: "AUD" },
  { label: "EUR/USD", localTicker: "^DE10YT=RR", invert: false, bullish: "EUR" },
  { label: "GBP/USD", localTicker: "^GB10YT=RR", invert: false, bullish: "GBP" },
  { label: "USD/JPY", localTicker: "^JP10YT=RR", invert: true, bullish: "USD" },
  { label: "USD/CAD", localTicker: "^CA10YT=RR", invert: true, bullish: "USD" },
];

const CB_DATA = [
  { bank: "Fed", currency: "USD", rate: "4.50%", bias: "hawkish", biaslabel: "Hawkish Hold", last: "Stabil seit Dez 2024" },
  { bank: "ECB", currency: "EUR", rate: "2.65%", bias: "dovish", biaslabel: "Dovish Cut", last: "Zuletzt -25bp Jan 2025" },
  { bank: "BoE", currency: "GBP", rate: "4.50%", bias: "neutral", biaslabel: "Neutral", last: "Letzte Änd. Feb 2025" },
  { bank: "BoJ", currency: "JPY", rate: "0.50%", bias: "hawkish", biaslabel: "Hawkish Hike", last: "Zuletzt +25bp Jan 2025" },
  { bank: "RBA", currency: "AUD", rate: "4.10%", bias: "dovish", biaslabel: "Dovish Cut", last: "Zuletzt -25bp Feb 2025" },
  { bank: "RBNZ", currency: "NZD", rate: "3.75%", bias: "dovish", biaslabel: "Dovish Cut", last: "Zuletzt -50bp Feb 2025" },
  { bank: "BoC", currency: "CAD", rate: "3.00%", bias: "dovish", biaslabel: "Dovish Cut", last: "Zuletzt -25bp Jan 2025" },
  { bank: "SNB", currency: "CHF", rate: "0.25%", bias: "dovish", biaslabel: "Dovish Cut", last: "Zuletzt -25bp Dez 2024" },
  { bank: "Riksbank", currency: "SEK", rate: "2.25%", bias: "neutral", biaslabel: "Neutral Pause", last: "Stabil seit Jan 2025" },
  { bank: "Norges", currency: "NOK", rate: "4.50%", bias: "neutral", biaslabel: "Hawkish Hold", last: "Stabil, erwartet Cut" },
];

let sentimentScoreHistory = [];
let histChartInstance = null;

async function fetchQuote(ticker) {
  try {
    const url = `${PROXY}${encodeURIComponent(ticker)}?interval=1d&range=5d&corsDomain=finance.yahoo.com`;
    const r = await fetch(url);
    const d = await r.json();
    const res = d?.chart?.result?.[0];
    if (!res) return null;
    const closes = res.indicators?.quote?.[0]?.close?.filter(v => v != null) || [];
    const prev = closes[closes.length - 2];
    const curr = closes[closes.length - 1] ?? res.meta?.regularMarketPrice;
    return {
      price: curr,
      prev,
      change: (curr && prev) ? ((curr - prev) / prev * 100) : null,
    };
  } catch { return null; }
}

function scoreComponent(data, riskDir) {
  if (!data || data.change === null) return 0;
  const chg = data.change * riskDir;
  if (chg > 2) return 3;
  if (chg > 0.8) return 2;
  if (chg > 0.2) return 1;
  if (chg < -2) return -3;
  if (chg < -0.8) return -2;
  if (chg < -0.2) return -1;
  return 0;
}

function fmt(n, dec=2) {
  if (n === null || n === undefined) return '—';
  return n.toFixed(dec);
}
function fmtChg(n) {
  if (n === null) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtPrice(n) {
  if (n === null) return '—';
  if (n >= 1000) return n.toFixed(0);
  if (n >= 10) return n.toFixed(2);
  return n.toFixed(3);
}

async function loadSentiment() {
  const entries = Object.entries(SENTIMENT_TICKERS);
  const results = await Promise.all(entries.map(([t]) => fetchQuote(t)));
  const map = {};
  entries.forEach(([t], i) => map[t] = results[i]);

  let total = 0, max = 0;
  const rows = entries.map(([ticker, cfg]) => {
    const data = map[ticker];
    const score = scoreComponent(data, cfg.riskDir);
    total += score;
    max += 3;
    return { ticker, cfg, data, score };
  });

  const normalized = Math.round((total / max) * 100);
  const sentiment = normalized > 20 ? 'risk-on' : normalized < -20 ? 'risk-off' : 'neutral';
  const color = sentiment === 'risk-on' ? 'var(--green)' : sentiment === 'risk-off' ? 'var(--red)' : 'var(--amber)';
  const badgeClass = sentiment === 'risk-on' ? 'bg-green' : sentiment === 'risk-off' ? 'bg-red' : 'bg-amber';
  const label = sentiment === 'risk-on' ? 'Risk-On' : sentiment === 'risk-off' ? 'Risk-Off' : 'Neutral';
  const desc = {
    'risk-on': 'Bullish bias. Carry-Long favorisiert: AUD/JPY, NZD/CHF. Risk assets bevorzugt.',
    'risk-off': 'Defensives Umfeld. Safe Haven: JPY, CHF stärker. Short Carry.',
    'neutral': 'Gemischte Signale. Kein klarer direktionaler Bias. Selektiv traden.',
  }[sentiment];

  const circ = 2 * Math.PI * 30;
  const pct = (normalized + 100) / 200;
  const dash = (pct * circ).toFixed(1);
  const offset = (circ * 0.25).toFixed(1);

  document.getElementById('sentiment-main-content').innerHTML = `
    <div class="sentiment-top">
      <div class="score-circle">
        <svg width="76" height="76" viewBox="0 0 76 76">
          <circle cx="38" cy="38" r="30" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
          <circle cx="38" cy="38" r="30" fill="none" stroke="${color}" stroke-width="5"
            stroke-dasharray="${dash} ${circ.toFixed(1)}"
            stroke-dashoffset="${offset}"
            stroke-linecap="round"
            transform="rotate(-90 38 38)"/>
        </svg>
        <div class="score-inner">
          <div class="score-num" style="color:${color}">${normalized > 0 ? '+' : ''}${normalized}</div>
          <div class="score-denom">/ 100</div>
        </div>
      </div>
      <div class="sentiment-info">
        <span class="sentiment-badge ${badgeClass}">${label}</span>
        <div class="sentiment-desc">${desc}</div>
      </div>
    </div>
    <div class="drivers-grid">
      ${rows.map(({ cfg, data, score }) => {
        const chg = data?.change ?? null;
        const contrib = score > 0 ? '<span class="c-green">↑ risk-on</span>' : score < 0 ? '<span class="c-red">↓ risk-off</span>' : '<span class="c-muted">→ neutral</span>';
        const chgCls = chg === null ? 'c-muted' : chg > 0 ? 'c-green' : 'c-red';
        return `<div class="driver">
          <div class="driver-name">${cfg.label}</div>
          <div class="driver-sub">${cfg.sub}</div>
          <div class="driver-price">${fmtPrice(data?.price ?? null)}</div>
          <div class="driver-chg ${chgCls}">${fmtChg(chg)}</div>
          <div class="driver-contrib">${contrib}</div>
        </div>`;
      }).join('')}
    </div>`;

  // Market drivers side panel
  document.getElementById('market-drivers-content').innerHTML = `
    <div class="market-drivers">
      ${rows.map(({ cfg, data }) => {
        const chg = data?.change ?? null;
        const chgCls = chg === null ? 'c-muted' : chg > 0 ? 'c-green' : 'c-red';
        return `<div class="md-row">
          <div class="md-left">
            <div class="md-name">${cfg.label}</div>
            <div class="md-sub">${cfg.sub}</div>
          </div>
          <div class="md-right">
            <div class="md-val">${fmtPrice(data?.price ?? null)}</div>
            <div class="md-chg ${chgCls}">${fmtChg(chg)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  return { normalized, sentiment, rows };
}

async function loadSpreads() {
  const usTicker = "^TNX";
  const [usData, ...localData] = await Promise.all([
    fetchQuote(usTicker),
    ...SPREAD_PAIRS.map(p => fetchQuote(p.localTicker))
  ]);
  const usRate = usData?.price ?? null;

  const grid = document.getElementById('spreads-grid');
  grid.innerHTML = SPREAD_PAIRS.map((p, i) => {
    const localRate = localData[i]?.price ?? null;
    let spread = null, spreadStr = '—', spreadCls = 'c-muted', bias = '—', biasCls = 'c-muted';
    if (localRate !== null && usRate !== null) {
      spread = p.invert ? (usRate - localRate) : (localRate - usRate);
      spreadStr = (spread >= 0 ? '+' : '') + spread.toFixed(2) + '%';
      spreadCls = spread > 0.15 ? 'c-green' : spread < -0.15 ? 'c-red' : 'c-amber';
      const base = p.label.split('/')[0];
      const quote = p.label.split('/')[1];
      bias = spread > 0.15 ? `↑ ${base} bullish` : spread < -0.15 ? `↑ ${quote} bullish` : '→ Neutral';
      biasCls = spread > 0.15 ? 'c-green' : spread < -0.15 ? 'c-red' : 'c-amber';
    }
    const localStr = localRate ? localRate.toFixed(2) + '%' : '—';
    const usStr = usRate ? usRate.toFixed(2) + '%' : '—';
    return `<div class="spread-card">
      <div class="spread-pair">${p.label}</div>
      <div class="spread-val ${spreadCls}">${spreadStr}</div>
      <div class="spread-desc">${p.invert ? 'US' : p.label.split('/')[0]} ${localStr} · USD ${usStr}</div>
      <div class="spread-bias ${biasCls}">${bias}</div>
    </div>`;
  }).join('');

  return SPREAD_PAIRS.map((p, i) => ({
    pair: p.label,
    spread: (() => {
      const lr = localData[i]?.price ?? null;
      if (lr === null || usRate === null) return null;
      return p.invert ? (usRate - lr) : (lr - usRate);
    })(),
    bullish: p.bullish,
    invert: p.invert,
  }));
}

function renderCBBias() {
  const biasMap = {
    hawkish: 'bg-red',
    dovish: 'bg-green',
    neutral: 'bg-amber',
  };
  document.getElementById('cb-grid').innerHTML = CB_DATA.map(cb => `
    <div class="cb-card">
      <div class="cb-bank">${cb.bank}</div>
      <div class="cb-currency">${cb.currency}</div>
      <div class="cb-rate">${cb.rate}</div>
      <span class="cb-badge ${biasMap[cb.bias]}">${cb.biaslabel}</span>
      <div class="cb-last">${cb.last}</div>
    </div>`).join('');
}

function renderMatrix(sentimentScore, spreadData) {
  const pairs = ["AUD/USD", "EUR/USD", "GBP/USD", "USD/JPY", "USD/CAD", "NZD/USD"];
  const sentBias = sentimentScore > 20 ? 1 : sentimentScore < -20 ? -1 : 0;

  // CB bias map: positive = base bullish, negative = quote bullish
  const cbBiasMap = {
    USD: 1, JPY: 1, AUD: -1, NZD: -1, EUR: -1, GBP: 0, CAD: -1, CHF: -1, SEK: 0, NOK: 0,
  };

  const spreadMap = {};
  spreadData.forEach(s => { spreadMap[s.pair] = s; });

  const rows = pairs.map(pair => {
    const [base, quote] = pair.split('/');
    const sp = spreadMap[pair];
    const spreadScore = sp?.spread == null ? 0 : sp.spread > 0.2 ? 1 : sp.spread < -0.2 ? -1 : 0;
    const cbScore = (cbBiasMap[base] ?? 0) - (cbBiasMap[quote] ?? 0);
    const cbNorm = cbScore > 0 ? 1 : cbScore < 0 ? -1 : 0;
    const sentPair = base === 'USD' ? -sentBias : (quote === 'USD' ? sentBias : 0);

    const total = spreadScore + cbNorm + sentPair;
    let label, cls;
    if (total >= 2) { label = '↑ Strong Buy'; cls = 'bg-green'; }
    else if (total === 1) { label = '↑ Buy'; cls = 'bg-green'; }
    else if (total === -1) { label = '↓ Sell'; cls = 'bg-red'; }
    else if (total <= -2) { label = '↓ Strong Sell'; cls = 'bg-red'; }
    else { label = '→ Neutral'; cls = 'bg-amber'; }

    const spStr = sp?.spread == null ? '—' : (sp.spread >= 0 ? '+' : '') + sp.spread.toFixed(2) + '%';
    const cbStr = cbNorm > 0 ? '↑' : cbNorm < 0 ? '↓' : '→';
    const sentStr = sentPair > 0 ? '↑' : sentPair < 0 ? '↓' : '→';

    return `<tr>
      <td class="pair-label">${pair}</td>
      <td>${spStr}</td>
      <td>${cbStr}</td>
      <td>${sentStr}</td>
      <td><span class="matrix-cell ${cls}">${label}</span></td>
    </tr>`;
  });

  document.getElementById('matrix-wrap').innerHTML = `
    <table class="matrix">
      <thead>
        <tr>
          <th style="text-align:left">Pair</th>
          <th>Yield Spread</th>
          <th>CB Bias</th>
          <th>Risk Sentiment</th>
          <th>Gesamtbias</th>
        </tr>
      </thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
}

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');

  try {
    const [sentResult, spreadData] = await Promise.all([
      loadSentiment(),
      loadSpreads(),
    ]);
    renderCBBias();
    renderMatrix(sentResult.normalized, spreadData);

    const now = new Date();
    const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    const dateStr = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    document.getElementById('updated-label').textContent = `Aktualisiert ${dateStr} ${timeStr}`;
    document.getElementById('footer-updated').textContent = `Daten via Yahoo Finance · Zuletzt geladen: ${dateStr} ${timeStr} · CB Bias: manuell gepflegt`;
  } catch(e) {
    console.error(e);
  }

  btn.classList.remove('loading');
}

// Auto-refresh every 5 minutes
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
